services:
  ponder:
    image: ghcr.io/itsdnns/ponder:latest
    container_name: Ponder
    restart: unless-stopped
    ports:
      - "9077:9077"
    volumes:
      - ponder_data:/data
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9077/api/status')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  ponder_data:
